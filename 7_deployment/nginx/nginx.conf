# ══════════════════════════════════════════════════════════════
#  ReconMind — Nginx Configuration
#  - Serves static frontend
#  - Reverse proxies /api/* and /auth/* to FastAPI backend
#  - HTTP → HTTPS redirect
#  - WebSocket support (for future real-time features)
# ══════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # Upstream — FastAPI backend
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ─────────────────────────────────────
    # HTTP → HTTPS redirect
    # ─────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────
    # HTTPS — Main server
    # ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name reconmind.yourdomain.com;   # ← Change this

        # SSL certificates (use Let's Encrypt / certbot)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 10M;

        # ── Static Frontend ───────────────
        location / {
            root /usr/share/nginx/html;
            index dashboard.html;
            try_files $uri $uri/ /dashboard.html;
        }

        # ── Backend API ───────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # CORS handled by FastAPI
        }

        # ── Auth Routes ───────────────────
        location /auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API Docs (restrict in production) ──
        location /docs {
            # Uncomment to restrict docs access by IP:
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Health check ─────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Report downloads ─────────────
        location /api/reports/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_buffering off;          # Stream file directly
        }
    }
}
