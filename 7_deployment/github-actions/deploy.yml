name: ReconMind — Deploy to Production

# ══════════════════════════════════════════════════════════════
#  GitHub Actions CI/CD Pipeline
#
#  Triggers:
#    - Push to main branch → full deploy
#    - Pull request        → run tests only
#
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    SERVER_HOST     → your VPS IP or domain
#    SERVER_USER     → SSH user (e.g. ubuntu)
#    SERVER_SSH_KEY  → private SSH key for server access
#    DEPLOY_PATH     → /home/ubuntu/reconmind (path on server)
# ══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────
  # Job 1: Lint + Test
  # ─────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          cd 2_backend
          pip install -r requirements.txt

      - name: Syntax check — backend
        run: |
          python3 -c "
          import ast, os, sys
          root = '2_backend'
          errors = []
          for dirpath, _, files in os.walk(root):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(dirpath, f)
                      try:
                          ast.parse(open(path).read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
                          print(f'FAIL: {path}: {e}')
          if errors:
              sys.exit(1)
          print(f'All files passed syntax check')
          "

      - name: Syntax check — scanner
        run: |
          cd 3_scanner
          pip install -r requirements.txt
          python3 -c "
          import ast, os, sys
          errors = []
          for dirpath, _, files in os.walk('.'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(dirpath, f)
                      try:
                          ast.parse(open(path).read())
                      except SyntaxError as e:
                          errors.append(str(e))
          if errors:
              sys.exit(1)
          print('Scanner files OK')
          "

      - name: Syntax check — training pipeline
        run: |
          for f in 5_training/pipeline/*.py; do
            python3 -c "import ast; ast.parse(open('$f').read())" && echo "OK: $f"
          done

  # ─────────────────────────────────────
  # Job 2: Build Docker images
  # ─────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build \
            -f 7_deployment/docker/Dockerfile.backend \
            -t reconmind-backend:${{ github.sha }} \
            2_backend/

      - name: Build scanner image
        run: |
          docker build \
            -f 7_deployment/docker/Dockerfile.scanner \
            -t reconmind-scanner:${{ github.sha }} \
            3_scanner/

      - name: Test images start correctly
        run: |
          docker run --rm reconmind-backend:${{ github.sha }} \
            python -c "from main import app; print('Backend import OK')" || true

  # ─────────────────────────────────────
  # Job 3: Deploy to VPS
  # ─────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding containers..."
            docker compose -f 7_deployment/docker-compose.yml build

            echo "Running rolling restart..."
            docker compose -f 7_deployment/docker-compose.yml up -d --no-deps backend
            sleep 5
            docker compose -f 7_deployment/docker-compose.yml up -d --no-deps scanner
            docker compose -f 7_deployment/docker-compose.yml up -d --no-deps ai_worker
            docker compose -f 7_deployment/docker-compose.yml up -d --no-deps nginx

            echo "Health check..."
            sleep 8
            curl -f http://localhost:8000/health && echo "Backend healthy ✅"

            echo "Cleaning old Docker images..."
            docker image prune -f

            echo "Deploy complete!"

      - name: Notify on success
        if: success()
        run: echo "✅ Deploy successful for commit ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Deploy failed for commit ${{ github.sha }}"
